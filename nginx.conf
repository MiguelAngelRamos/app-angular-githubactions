# ════════════════════════════════════════════════════════════════
#  Nginx — servir SPA Angular en producción
#  SPA = Single Page Application (aplicación de una sola página).
#  El servidor solo entrega index.html y los bundles compilados;
#  Angular hace toda la navegación dentro del navegador del cliente.
# ════════════════════════════════════════════════════════════════

server {
    # Puerto no privilegiado: los puertos < 1024 requieren root en Linux.
    # En despliegue se mapea al puerto público:
    #   docker run -p 80:8080 mi-imagen
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Defensa contra DoS (Denial of Service / denegación de servicio):
    # esta SPA no recibe uploads grandes, así que limitamos el body
    # de las peticiones. Si alguien intenta subir 500 MB, se rechaza.
    client_max_body_size 1m;

    # ────────────────────────────────────────────────────────────
    #  Compresión gzip
    #  Reduce el tamaño de respuestas de texto un 70-85%, acelerando
    #  la carga de la app sobre todo en redes móviles.
    #  gzip_vary añade "Vary: Accept-Encoding" para que CDNs cacheen
    #  por separado las versiones comprimida y sin comprimir según
    #  el navegador del cliente.
    #  CDN = Content Delivery Network (red de servidores distribuidos
    #  que cachean contenido cerca del usuario).
    # ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ────────────────────────────────────────────────────────────
    #  Cabeceras de seguridad
    #  OWASP = Open Worldwide Application Security Project
    #  (organización que mantiene el "Top 10" de vulnerabilidades
    #  web más comunes). Estas cabeceras mitigan varias categorías
    #  del Top 10, especialmente A05 "Security Misconfiguration".
    #
    #  Nota técnica importante sobre Nginx: si en un `location` se
    #  añade un `add_header`, NGINX deja de heredar los `add_header`
    #  declarados en el `server`. Por eso, en los locations de cache
    #  de abajo usamos solo `expires` (que controla Cache-Control sin
    #  ser un add_header), conservando así esta herencia.
    # ────────────────────────────────────────────────────────────

    # Oculta la versión de Nginx en respuestas y páginas de error.
    # Saber la versión exacta facilita a un atacante buscar exploits
    # publicados para esa versión.
    server_tokens off;

    # X-Frame-Options: impide que la app sea embebida en un <iframe>
    # de otra web. Previene "clickjacking": un sitio malicioso superpone
    # tu app invisible sobre botones falsos y engaña al usuario para
    # que clique en acciones (ej. transferir dinero) sin saberlo.
    add_header X-Frame-Options "DENY" always;

    # X-Content-Type-Options: bloquea el "MIME sniffing" del navegador.
    # MIME = Multipurpose Internet Mail Extensions (identifica el tipo
    # del archivo: text/html, application/json, etc.). Sin esto,
    # navegadores antiguos podían "adivinar" el tipo según el contenido,
    # abriendo la puerta a XSS si un .txt subido por un usuario se
    # interpretaba como HTML.
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-Policy: controla qué se envía en la cabecera Referer
    # (URL de origen) cuando el usuario navega a otro dominio.
    # "strict-origin-when-cross-origin": en cross-origin solo se manda
    # el origen (https://miapp.com), nunca la ruta completa, que
    # podría contener IDs sensibles (ej: /users/12345/private-token).
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy: deshabilita APIs del navegador que la app
    # no usa. Si una librería de terceros comprometida intentara abrir
    # la cámara del usuario, el navegador la bloquearía aunque el
    # código lo pidiera explícitamente.
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Content-Security-Policy (CSP): la cabecera más potente contra
    # XSS = Cross-Site Scripting (inyección de scripts maliciosos).
    # Define qué orígenes están autorizados a cargar scripts/estilos/
    # imágenes/etc.
    #   default-src 'self'   → todo solo desde el propio dominio
    #   script-src 'self'    → solo JS propio (bloquea inline scripts)
    #   style-src ... unsafe-inline → Angular usa estilos inline en
    #     componentes; sin 'unsafe-inline' los estilos no aplican.
    #   img-src 'self' data: → permite imágenes propias y data URIs.
    #   frame-ancestors 'none' → equivalente moderno a X-Frame-Options.
    # AJUSTA esta política a tu app: si usas Google Fonts, una API
    # en otro dominio o un CDN, debes añadirlos. Una CSP demasiado
    # estricta romperá la app; demasiado laxa no protegerá.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # HSTS = HTTP Strict Transport Security
    # Fuerza al navegador a usar siempre HTTPS para este dominio,
    # incluso si el usuario escribe "http://" o sigue un enlace http.
    # Activa SOLO cuando tu sitio sirve HTTPS de forma estable: durante
    # el max-age (1 año aquí) los navegadores rehusarán http:// para
    # este dominio. Si después quitaras el TLS, los usuarios verían
    # errores. TLS = Transport Layer Security (la "S" de HTTPS).
    # Descomenta cuando estés en producción detrás de un certificado.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ────────────────────────────────────────────────────────────
    #  Routing de SPA: Angular maneja sus propias rutas
    #  Sin try_files, hacer F5 en /admin/dashboard daría 404 porque
    #  ese archivo físico no existe en disco. Devolvemos siempre el
    #  index.html y Angular lee la URL del navegador para mostrar
    #  la vista correspondiente (Angular Router).
    # ────────────────────────────────────────────────────────────

    # ────────────────────────────────────────────────────────────
    #  Proxy inverso hacia el backend NestJS
    #  En producción no existe el proxy del dev-server de Angular,
    #  así que Nginx asume ese rol: intercepta todas las rutas /api/
    #  y las reenvía al backend en 192.168.1.30:3000.
    #  proxy_set_header corrige las cabeceras para que NestJS reciba
    #  el host y la IP real del cliente en lugar de la de Nginx.
    # ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://192.168.1.30:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ────────────────────────────────────────────────────────────
    #  Cache de index.html: NUNCA cachear de forma agresiva
    #  index.html referencia a los bundles JS/CSS por su hash. Si el
    #  navegador guarda en cache un index.html viejo, seguirá pidiendo
    #  bundles con hashes que ya no existen tras un deploy → app rota.
    #  `expires -1` produce "Cache-Control: no-cache" (el navegador
    #  puede guardar pero debe revalidar antes de servir). Usamos
    #  expires en lugar de add_header para conservar la herencia
    #  de las cabeceras de seguridad declaradas arriba.
    # ────────────────────────────────────────────────────────────
    location = /index.html {
        expires -1;
    }

    # ────────────────────────────────────────────────────────────
    #  Cache largo para bundles con hash en el nombre
    #  Angular en modo producción genera nombres como
    #    main-A1B2C3D4E5F6G7H8.js
    #  El hash cambia si el contenido cambia, así que estos archivos
    #  son INMUTABLES: una vez descargados, podemos cachearlos durante
    #  un año entero sin riesgo de servir versiones viejas.
    #  El regex acepta hashes de 8 o más caracteres hexadecimales,
    #  cubriendo tanto Angular antiguos (8 chars) como modernos (16+).
    # ────────────────────────────────────────────────────────────
    location ~* "-[0-9a-f]{8,}\.(?:js|css|woff2?)$" {
        expires 1y;
    }

    # Cache moderado para imágenes y otros estáticos sin hash.
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 7d;
    }

    # ────────────────────────────────────────────────────────────
    #  Bloquear archivos sensibles (defensa en profundidad)
    #  El COPY del Dockerfile solo trae /browser, pero si por error
    #  se subiera un archivo de configuración o un source-map,
    #  Nginx no lo serviría.
    #  - .env, .lock: secretos y dependencias internas.
    #  - .map: source-maps revelan código TypeScript original.
    #  - .md, .ts, .conf, .sh, .log: archivos del repo, no estáticos.
    # ────────────────────────────────────────────────────────────
    location ~* \.(?:env|map|lock|md|sh|ts|conf|log)$ {
        deny all;
        return 404;
    }

    # Bloquear acceso a directorios y archivos ocultos
    # (.git, .vscode, .ssh, .htaccess, etc.).
    location ~ /\. {
        deny all;
        return 404;
    }

    # ────────────────────────────────────────────────────────────
    #  Páginas de error
    #  Para una SPA, los 404 deben servir el index.html para que
    #  Angular muestre su propia página de error o redireccione.
    # ────────────────────────────────────────────────────────────
    error_page 404 /index.html;
}
